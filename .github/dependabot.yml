version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/network"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/frontend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "terraform"
    directory: "/terraform/envs/local"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
