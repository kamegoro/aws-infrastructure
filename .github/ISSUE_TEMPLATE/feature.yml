name: 機能追加・改善
description: 新しいモジュール・機能・改善を提案する
title: ""
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: なぜこの変更が必要か
    validations:
      required: true
  - type: textarea
    id: todo
    attributes:
      label: やること
      description: 実装内容を箇条書きで
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 受け入れ条件
      description: |
        何をもって完了とするか（箇条書き）。
        `claude-ready` ラベルでissue-to-PR workflowを起動する場合、
        Claudeはこの条件を実装の完了判定として使用します。
      placeholder: |
        - terraform fmt / validate / tflint がpassすること
        - CIのplan/apply/destroyがpassすること
        - （モジュール固有の確認項目）
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: 技術ノート（任意）
      description: |
        変更対象のファイル・モジュール、使うべきパターン・禁止パターンなど。
        具体的なヒントがあるほどissue-to-PRの実装精度が上がります。
      placeholder: |
        - 変更対象: terraform/modules/xxx/
        - 参考にする既存モジュール: terraform/modules/yyy/
        - （注意点・制約など）
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: 関連
      description: 関連するissue/PR、umbrella issueなど
    validations:
      required: false
