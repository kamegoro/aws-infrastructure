name: Dependabot PR Review

on:
  # pull_requestのままだとDependabot作成PRはfork PR相当の制限コンテキストで
  # 実行され、GITHUB_TOKEN以外のsecretsが渡らずCLAUDE_CODE_OAUTH_TOKENが
  # 空になる(#177)。pull_request_targetはbase repoコンテキストで実行され
  # secretsにアクセスできる。デフォルトのcheckoutはPRのhead refではなく
  # base refのため、PRの中身(コード)が実行されることはない。
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    # Dependabotが作成したPRのみを対象とする
    # (actor/PR作成者の偽装は不可能なため、このチェックがゲートとして機能する)
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 自動化の有効化チェック
        id: check
        run: |
          if [ "${{ vars.CLAUDE_AUTOMATION_ENABLED }}" = "false" ] || [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      # 再push(synchronize)時に古い判定ラベルが残っていると、
      # 再レビュー完了前にauto-merge.ymlが古い承認で動いてしまうため、
      # レビュー前にラベルをリセットする
      - name: 既存の判定ラベルをリセット
        if: steps.check.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label auto-merge-approved \
            --remove-label needs-human-review || true

      - uses: actions/checkout@v7
        if: steps.check.outputs.enabled == 'true'

      - name: Dependabot PRをレビュー
        if: steps.check.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 10
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*)"
          prompt: |
            このPR(#${{ github.event.pull_request.number }})はDependabotによる
            依存関係の更新です。`gh pr view`・`gh pr diff`でPRの内容
            （対象パッケージ、バージョン差分、変更ファイル）を確認し、
            以下のルールに従って分類してください。

            ## 分類ルール

            - **`auto-merge-approved`を付与する条件（すべて満たす場合のみ）**
              - GitHub Actions または Terraformプロバイダ/モジュールの
                patchまたはminorバージョンアップであること
                （`x.Y.Z` → `x.Y'.Z'`、メジャーバージョン`x`が変わらない）
              - 変更が`.github/`または`terraform/`配下のバージョン指定
                （lockfile, required_providers等）のみであること
              - PR説明やdiffにBreaking Change・セキュリティアドバイザリ・
                非推奨化の記載がないこと
            - **上記以外は必ず`needs-human-review`を付与する**
              - メジャーバージョンアップは、Breaking Changeの記載が
                無くても必ずこちらに分類する
              - 変更内容が上記以外のファイルに及ぶ場合や、判断に迷う場合も
                こちらに分類する

            ## 実施内容

            1. `gh pr view ${{ github.event.pull_request.number }}` と
               `gh pr diff ${{ github.event.pull_request.number }}` で
               内容を確認する
            2. 上記ルールに基づき分類する
            3. `gh pr edit ${{ github.event.pull_request.number }} --add-label <label>`
               でラベルを1つ付与する
            4. `gh pr comment ${{ github.event.pull_request.number }}`で、
               判定結果と根拠（バージョン差分、確認したリリースノートの
               URL等）を日本語で簡潔にコメントする

            ## 禁止事項

            - コードの編集・コミット・PRのマージは行わないこと
            - `gh pr merge`等のマージに関するコマンドは実行しないこと
            - 上記の`allowedTools`以外のコマンドは実行できません
