name: Dependabot Auto Merge

on:
  workflow_run:
    workflows: ["Terraform"]
    types: [completed]

jobs:
  auto-merge:
    # claude-code-actionは使用しない(LLMの判断ではなく、PR作成者とCI結果のみで
    # 機械的にマージ可否を決定する)。workflow_runはDependabot作成のPRに対しても
    # base repoコンテキストで実行されるため、GITHUB_TOKENの権限がpull_requestの
    # ように制限されない(#177)。
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-auto-merge-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 自動化の有効化チェック
        id: check
        run: |
          if [ "${{ vars.CLAUDE_AUTOMATION_ENABLED }}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 対象PR番号を解決
        id: pr
        if: steps.check.outputs.enabled == 'true'
        run: |
          number="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "$number" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "number=$number" >> "$GITHUB_OUTPUT"
          fi

      - name: マージ条件を確認してマージ
        if: steps.check.outputs.enabled == 'true' && steps.pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          # 1. Dependabotが作成したPRであることを確認する
          #    (このjobはcontents: writeでマージを実行するため、対象を限定する)
          author=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author -q '.author.login')
          if [ "$author" != "dependabot[bot]" ]; then
            echo "Dependabot以外のPR(author=$author)のため対象外"
            exit 0
          fi

          # 2. draft PRは対象外
          is_draft=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft -q '.isDraft')
          if [ "$is_draft" = "true" ]; then
            echo "draft PRのため対象外"
            exit 0
          fi

          # 3. CIの結果を確認する(バージョンの種類や内容は判定しない。
          #    メジャーバージョンアップも含め、CIが全passならマージする)
          buckets=$(gh pr checks "$PR_NUMBER" --repo "$REPO" --json bucket -q '.[].bucket')
          echo "check buckets:"
          echo "$buckets"
          if echo "$buckets" | grep -qx "fail"; then
            echo "失敗しているチェックがあるためマージしない"
            exit 0
          fi
          if echo "$buckets" | grep -qx "pending"; then
            echo "実行中のチェックがあるため、auto-mergeを有効化して完了を待つ"
            gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
            exit 0
          fi

          echo "全チェックがpass/skippingのためマージする"
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
