name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
      - name: terraform fmtチェック
        run: terraform fmt -check -recursive terraform

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: tflintを実行
        run: |
          tflint --init
          tflint --recursive --format compact

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: tfsecをインストール
        run: |
          curl -sSL "https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64" -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec
      - name: tfsecを実行
        run: tfsec terraform --config-file .tfsec/config.yml

  validate:
    name: terraform validate (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - terraform/modules/network
          - terraform/modules/static-site
          - terraform/modules/fargate-service
          - terraform/modules/database
          - terraform/modules/secrets
          - terraform/modules/ecr
          - terraform/envs/local
          - terraform/envs/dev
          - terraform/envs/stg
          - terraform/envs/prod
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
      - name: terraform init
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false
      - name: terraform validate
        working-directory: ${{ matrix.dir }}
        run: terraform validate

  ministack:
    name: terraform plan/apply (MiniStack)
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:1.3.63
        ports:
          - 4566:4566
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        options: >-
          --health-cmd "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"

      - name: MiniStackに対してplan
        working-directory: terraform/envs/local
        run: |
          terraform init
          terraform plan

      - name: MiniStackに対してフル環境をapply
        working-directory: terraform/envs/local
        run: terraform apply -auto-approve

      # MiniStack 1.3.63のバグ回避 (https://github.com/ministackorg/ministack/issues/915)
      # destroy前にPublic Access Blockをstateから外し、destroy-waiterのタイムアウトを防ぐ
      - name: MiniStackのフル環境をdestroy
        working-directory: terraform/envs/local
        run: |
          terraform state rm module.static_site.aws_s3_bucket_public_access_block.frontend
          terraform destroy -auto-approve
