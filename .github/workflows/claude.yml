name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # claude-readyラベルが付与されたissue/PRでのみ@claudeメンションに応答する
    # (ADR 0004のラベル方式の間接的な自動化方針に合わせ、意図しない発火を防ぐ)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(github.event.issue.labels.*.name, 'claude-ready')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'claude-ready')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'claude-ready')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude') && contains(github.event.issue.labels.*.name, 'claude-ready'))
    runs-on: ubuntu-latest
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # CLAUDE_CODE_OAUTH_TOKENは`claude setup-token`で発行したトークンを
      # 登録するまで未登録のため、未登録の間はこのジョブをno-opにしてCIを失敗させない
      - name: 自動化の有効化チェック
        id: check
        run: |
          if [ "${{ vars.CLAUDE_AUTOMATION_ENABLED }}" = "false" ] || [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.enabled == 'true'

      - name: Claude Codeを実行
        if: steps.check.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 30
